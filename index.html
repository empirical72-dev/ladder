<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사다리 타기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>사다리 타기</h1>

  <div class="input-group">
    참가자: <input id="playerInput" type="text">
    <button id="addPlayerBtn">추가</button>
    <ul id="playerList"></ul>
  </div>

  <div class="input-group">
    항목: <input id="itemName" type="text">
    개수: <input id="itemCount" type="number">
    <button id="addItemBtn">추가</button>
    <ul id="itemList"></ul>
  </div>

  <div class="control-group">
    <button id="drawBtn">사다리 실행</button>
    <button id="resetBtn">전체 리셋</button>
  </div>

  <canvas id="ladderCanvas" width="800" height="500"></canvas>

  <div id="playerButtons"></div>
  <div id="result"></div>

  <script src="script.js"></script>
</body>
</html>
